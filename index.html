<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O R I G I N A L Esports</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR /
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: black;
  position: sticky;
  top: 0;
}

nav h2 {
  color: #ff0033;
  letter-spacing: 5px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/ HERO /
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(black, #0a0a0a);
  text-align: center;
}

.hero img {
  width: 140px;
}

.hero h1 {
  font-size: 60px;
  color: #ff0033;
  letter-spacing: 10px;
}

.hero p {
  opacity: 0.7;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: #ff0033;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: #ff3355;
}

/ SECTIONS /
section {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 10px;
  width: 220px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/ FOOTER */
footer {
  background: black;
  padding: 20px;
  text-align: center;
  font-size: 14px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>O R I G I N A L</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Team</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <img src="logo.png">
  <h1>O R I G I N A L</h1>
  <p>Free Fire & PUBG Esports Team</p>
  <a class="btn" href="#">SHOP NOW</a>
</div>

<!-- GAMES -->
<section>
  <h2>Our Games</h2>
  <div class="cards">
    <div class="card">Free Fire</div>
    <div class="card">PUBG</div>
  </div>
</section>

<!-- TEAM -->
<section>
  <h2>Our Squad</h2>
  <div class="cards">
    <div class="card">Player 1 - IGL</div>
    <div class="card">Player 2 - Sniper</div>
    <div class="card">Player 3 - Support</div>
  </div>
</section>

<!-- ACHIEVEMENTS -->
<section>
  <h2>Achievements</h2>
  <p>🏆 Coming Soon...</p>
</section>

<!-- CONTACT -->
<section>
  <h2>Follow Us</h2>
  <p>Instagram | YouTube | TikTok</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 O R I G I N A L Esports</p>
</footer>

</body>
</html>
