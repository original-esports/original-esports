<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGINAL ESPORTS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, #0a0f1f, #000);
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img { width: 40px; }

nav a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
  transition: 0.3s;
}

nav a:hover {
  color: #00c6ff;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/banner.jpg') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 28px;
  text-shadow: 0 0 20px #00c6ff;
  animation: fadeUp 1s ease;
}

/* BUTTONS */
.btn {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  display: inline-block;
  transition: 0.3s;
}

.join {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
}

.shop {
  background: linear-gradient(45deg, #ff3b3b, #ff0000);
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #00c6ff;
}

/* SECTION */
.section {
  padding: 50px 15px;
  text-align: center;
}

.section h1 {
  text-shadow: 0 0 10px #00c6ff;
}

/* CARDS */
.cards {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  background: rgba(20,20,20,0.8);
  border-radius: 15px;
  margin: 15px;
  padding: 15px;
  width: 90%;
  max-width: 300px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px #00c6ff;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* ANIMATION */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* PC VIEW */
@media (min-width: 768px) {
  .hero h1 { font-size: 50px; }

  .cards {
    flex-direction: row;
    justify-content: center;
  }

  .card {
    width: 250px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="images/logo.png">
    <b>ORIGINAL</b>
  </div>

  <div>
    <a href="#">Home</a>
    <a href="#team">Team</a>
    <a href="#store">Store</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Rise Slowly. Dominate Completely.</h1>

  <div>
    <a href="join.html" class="btn join">JOIN ORIGINAL</a>
    <a href="#store" class="btn shop">SHOP NOW</a>
  </div>
</div>

<!-- TEAM -->
<div class="section" id="team">
  <h1>Our Team</h1>

  <div class="cards">

    <div class="card">
      <a href="founder.html">
        <img src="images/founder.jpg">
      </a>
      <h3>Founder / CEO</h3>
    </div>

    <div class="card">
      <a href="cofounder.html">
        <img src="images/cofounder.jpg">
      </a>
      <h3>Co Founder</h3>
    </div>

    <div class="card">
      <a href="manager.html">
        <img src="images/manager.jpg">
      </a>
      <h3>Manager</h3>
    </div>

  </div>
</div>

<!-- STORE -->
<div class="section" id="store">
  <h1>Our Jerseys</h1>

  <div class="cards">

    <div class="card">
      <img src="images/jersey1.jpg">
      <h3>Official Jersey</h3>
    </div>

    <div class="card">
      <a href="jersey2.html">
        <img src="images/jersey2.jpg">
      </a>
      <h3>Coming Soon</h3>
    </div>

  </div>
</div>

</body>
</html>
