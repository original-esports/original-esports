<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGINAL ESPORTS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(to bottom, #0a0f1f, #050505);
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.6);
  position: fixed;
  width: 100%;
}

nav img { width: 50px; }

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/banner.jpg') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
}

.btn {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
}

.join { background: #00c6ff; }
.shop { background: #ff3b3b; }

/* TEAM */
.section {
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: #111;
  border-radius: 15px;
  margin: 20px auto;
  padding: 20px;
  max-width: 300px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

</style>
</head>

<body>

<nav>
  <div>
    <img src="images/logo.png">
    ORIGINAL
  </div>
  <div>
    <a href="#">Home</a>
    <a href="#team">Team</a>
    <a href="#store">Store</a>
  </div>
</nav>

<div class="hero">
  <h1>Rise Slowly. Dominate Completely.</h1>
  <div>
    <a href="join.html" class="btn join">JOIN ORIGINAL</a>
    <a href="#store" class="btn shop">SHOP NOW</a>
  </div>
</div>

<!-- TEAM -->
<div class="section" id="team">
  <h1>Our Team</h1>

  <div class="card">
    <a href="founder.html">
      <img src="images/founder.jpg">
    </a>
    <h3>Founder / CEO</h3>
  </div>

  <div class="card">
    <a href="cofounder.html">
      <img src="images/cofounder.jpg">
    </a>
    <h3>Co Founder</h3>
  </div>

  <div class="card">
    <a href="manager.html">
      <img src="images/manager.jpg">
    </a>
    <h3>Manager</h3>
  </div>
</div>

<!-- STORE -->
<div class="section" id="store">
  <h1>Our Jerseys</h1>

  <div class="card">
    <img src="images/jersey1.jpg">
    <h3>Official Jersey</h3>
  </div>

  <div class="card">
    <a href="jersey2.html">
      <img src="images/jersey2.jpg">
    </a>
    <h3>Coming Soon</h3>
  </div>
</div>

</body>
</html>
