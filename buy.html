<!DOCTYPE html>
<html>
<head>
<title>Buy Jersey</title>

<style>
body{
  background: linear-gradient(to right,#0b0f2a,#020617);
  color:white;
  font-family:sans-serif;
  margin:0;
}

/* CENTER FULL PAGE */
.container{
  max-width:500px;
  margin:80px auto;
  background:#111;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  text-align:center;
}

/* IMAGE FIX */
img{
  width:100%;
  max-width:420px;
  border-radius:10px;
  margin-bottom:15px;
}

/* TITLE */
h2{
  font-size:26px;
  margin-bottom:10px;
}

/* PRICE */
p{
  font-size:18px;
  color:#ccc;
}

/* INPUT */
input{
  width:100px;
  padding:10px;
  margin-top:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
  text-align:center;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:14px 30px;
  background:linear-gradient(45deg,#ff3c00,#ff9900);
  border:none;
  border-radius:25px;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,100,0,0.6);
  transition:0.3s;
}

button:hover{
  transform:scale(1.08);
}

/* NOTE */
.note{
  margin-top:20px;
  color:#aaa;
  font-size:14px;
}
}.container{
  max-width:90% !important;
  width:500px !important;
  margin:50px auto !important;
  padding:30px !important;
}

img{
  width:100% !important;
  max-width:450px !important;
}

h2{
  font-size:28px !important;
}

p{
  font-size:20px !important;
}

button{
  font-size:20px !important;
  padding:16px 35px !important;
}
</style>

</head>

<body>

<div class="container">

  <img src="images/jersey1.jpg">

  <h2>ORIGINAL Jersey</h2>

  <p>Price: Rs 2000</p>

  <label>Quantity (max 99):</label><br>
  <input type="number" min="1" max="99" value="1">

  <br><br>

  <button onclick="order()">Place Order</button>

  <p class="note">💳 PAYMENT METHOD COMING SOON</p>

</div>

<script>
function order(){
  alert("Order placed! We will contact you soon.");
}
</script>

</body>
</html>
