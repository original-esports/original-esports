<!DOCTYPE html>
<html>
<head>
<title>Buy Jersey</title>

<style>
body{
  background:#0b0f2a;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding:30px;
}

.container{
  max-width:400px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:15px;
}

img{
  width:100%;
  border-radius:10px;
}

h2{
  margin-top:15px;
}

input{
  width:80px;
  padding:8px;
  margin:10px;
  font-size:16px;
}

button{
  padding:12px 20px;
  background:orange;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

.note{
  margin-top:20px;
  color:#aaa;
}
</style>

</head>

<body>

<div class="container">

  <img src="images/jersey1.jpg">

  <h2>ORIGINAL Jersey</h2>

  <p>Price: Rs 2000</p>

  <label>Quantity (max 99):</label><br>
  <input type="number" min="1" max="99" value="1">

  <br><br>

  <button onclick="order()">Place Order</button>

  <p class="note">💳 PAYMENT METHOD COMING SOON</p>

</div>

<script>
function order(){
  alert("Order placed! We will contact you soon.");
}
</script>

</body>
</html>
